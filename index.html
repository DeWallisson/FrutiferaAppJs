<head>

  <!-- Bootstrap -->

<body>
  <header>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Frutífera</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
          aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="./index.html">Home</a>

            <li class="nav-item">

            </li>
          </ul>
        </div>
      </div>
    </nav>
  </header>
  <main>
    <!-- Carrossel -->
    <div class="container mt-4">
      <div id="carouselExampleCaptions" class="carousel slide">
        <!-- Botões indicadores -->
        <div class="carousel-indicators">
          <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="0" class="active"
            aria-current="true" aria-label="Slide 1"></button>
          <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="1"
            aria-label="Slide 2"></button>
        </div>
        <div class="carousel-inner">
          <div class="carousel-item active">
            <a href="frutifera.html">
              <img
                src="https://plus.unsplash.com/premium_photo-1679429383405-de11c569e905?q=80&w=1470&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D%22"
                class="d-block w-100" style="height: 700px; object-fit: cover;" alt="Plantio">
            </a>
            <div class="carousel-caption d-none d-md-block bg-dark bg-opacity-50 rounded p-3">
              <h5>Plantio e Safras</h5>
              <p>Cuide para colher.</p>
            </div>
          </div>

          <div class="carousel-item">
            <a href="frutifera.html">
              <img
                src="https://images.unsplash.com/photo-1666987571073-ce052bb99388?q=80&w=1374&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D%22"
                class="d-block w-100" style="height: 700px; object-fit: cover;" alt="Plantação">
            </a>
            <div class="carousel-caption d-none d-md-block bg-dark bg-opacity-50 rounded p-3">
              <h5>Cultivo Sustentável</h5>
              <p>Acompanhe o crescimento e produção.</p>
            </div>
          </div>
          <!-- Setinhas -->
          <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleCaptions"
            data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
          </button>
          <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleCaptions"
            data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
          </button>
        </div>
      </div>
    </div>

  <footer>
    <div class="container">
      <footer class="py-3 my-4">

        <p class="text-center text-body-secondary">© 2025 Company, Inc</p>
